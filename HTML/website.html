<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>
    <h1>This is a website with the worst UI to select your birthday</h1>
    <h2>Select your birthday, if you can</h2>
    <h3>Year</h3>
    <div>
        <div id="yearDisplay">1890</div>
        <input type="range" id="year" min="-202600" max="202600" value="1996"/>
    </div>
    <h3>Month</h3>
    <div>
        <div id="monthDisplay">1</div>
        <input type="range" id="month" min="-30000" max="30000" value="1996"/>
    </div>
    <h3>Day</h3>
    <div>
        <div id="dayDisplay">1</div>
        <input type="range" id="day" min="-30000" max="30000" value="1996"/>
    </div>
    <button id="submit">Submit</button>
    <div id="result"></div>
    <script>
        const result = document.getElementById("result");
        const yearSlider = document.getElementById("year");
        yearSlider.value = 1996;
        const yearDisplay = document.getElementById("yearDisplay");
        yearSlider.addEventListener("input", () => {
            yearDisplay.textContent = yearSlider.value;
        });
        const monthSlider = document.getElementById("month");
        monthSlider.value = 1996;
        const monthDisplay = document.getElementById("monthDisplay");
        monthSlider.addEventListener("input", () => {
            monthDisplay.textContent = monthSlider.value;
        });
        const daySlider = document.getElementById("day");
        daySlider.value = 1996;
        const dayDisplay = document.getElementById("dayDisplay");
        daySlider.addEventListener("input", () => {
            dayDisplay.textContent = daySlider.value;
        });
        const submitButton = document.getElementById("submit");
        submitButton.addEventListener("click", () => {
            result.textContent = "Your birthday is " + yearSlider.value + " " + monthSlider.value + " " + daySlider.value + " " + new Date(yearSlider.value, monthSlider.value, daySlider.value).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
        });
    </script>
</body>
</html>
